---
layout: default
---
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://anti-detect.github.io/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Blog",
      "item": "https://anti-detect.github.io/blog/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title }}",
      "item": "https://anti-detect.github.io{{ page.url }}"
    }
  ]
}
</script>
{% if page.howto %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": "{{ page.title }}",
  "description": "{{ page.excerpt | strip_html }}",
  "step": {{ page.howto | jsonify }}
}
</script>
{% endif %}
<article class="blog-post">
  <h1>{{ page.title }}</h1>
  <p class="blog-date">{{ page.date | date: '%d/%m/%Y' }}</p>
  <div class="blog-content">
    {{ content }}
  </div>
  {% include related-articles-rail.html %}
  {% include next-prev-article.html %}
</article>
