name: Jekyll build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
      - name: Build site
        run: bundle exec jekyll build
      - name: Install html-proofer
        run: |
          gem install html-proofer
      - name: Run link checks (html-proofer)
        run: |
          # Ignore external URLs to avoid blocking on third-party sites; add more patterns if needed
          bundle exec htmlproofer ./_site --disable-external --allow-hash-href \
            --url-ignore '/^https:\/\/multilogin.com/','/^https:\/\/www.google-analytics.com/'
